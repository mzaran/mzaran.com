<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="site-title">{{ site.author | default: site.title }}</a>
      <nav>
        <a href="{{ '/' | relative_url }}">~/posts</a>
        <a href="{{ '/about' | relative_url }}">~/about</a>
        {% if site.github_username %}<a href="https://github.com/{{ site.github_username }}" target="_blank">~/github</a>{% endif %}
      </nav>
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <span>{{ site.author }} &mdash; <a href="mailto:{{ site.email }}">{{ site.email }}</a></span>
      <a href="{{ '/feed.xml' | relative_url }}">rss</a>
    </div>
  </footer>
</body>
</html>
